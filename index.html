<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School 175 | Anarchy Server</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-gray-200">
    <div id="landing-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#0a0a0a]">
        <div class="text-center">
            <h1 class="text-5xl font-bold text-white mb-12">Select your edition</h1>
            <div class="flex gap-8">
                <button id="select-java" class="px-10 py-6 bg-neutral-800 hover:bg-purple-600 rounded-3xl text-2xl font-bold transition-all border border-neutral-700">Java Edition (PC)</button>
                <button id="select-bedrock" class="px-10 py-6 bg-neutral-800 hover:bg-blue-600 rounded-3xl text-2xl font-bold transition-all border border-neutral-700">Bedrock Edition (Mobile)</button>
            </div>
        </div>
    </div>

    <nav id="main-nav" class="hidden flex justify-center gap-1 p-4 bg-[#0a0a0a]/80 backdrop-blur-md sticky top-0 z-40 border-b border-neutral-800">
        <button class="nav-link px-4 py-2 text-neutral-400 hover:text-white" data-target="home">Home</button>
        <button class="nav-link px-4 py-2 text-neutral-400 hover:text-white" data-target="errors">Troubleshooting</button>
        <button class="nav-link px-4 py-2 text-neutral-400 hover:text-white" data-target="resource-packs">Resource Packs</button>
        <button class="nav-link px-4 py-2 text-neutral-400 hover:text-white" data-target="discord">Discord</button>
    </nav>

    <main id="main-content" class="hidden container mx-auto px-4 py-8">
        <div id="home" class="page-content max-w-4xl mx-auto p-10">
            <h1 class="text-6xl font-extrabold mb-8 text-white">School <span class="text-purple-500">175</span></h1>
            <p id="selection-text" class="text-xl mb-12 text-neutral-400">Welcome to School 175 — the epicenter of chaos. No rules, just survival.</p>
            <div id="server-info" class="bg-neutral-900/50 p-8 rounded-3xl border border-neutral-800">
                <!-- Dynamic Content -->
            </div>
        </div>

        <div id="errors" class="page-content max-w-3xl mx-auto p-10">
            <h1 class="text-4xl font-bold mb-8 text-white">Troubleshooting</h1>
            <div class="bg-neutral-900 p-8 rounded-2xl border border-neutral-800">
                <p class="text-lg mb-6 text-neutral-400">If you can't connect:</p>
                <ul class="space-y-4 text-neutral-200">
                    <li>1. Try clicking 'Connect' at least 5 times.</li>
                    <li>2. Restart Minecraft.</li>
                </ul>
            </div>
        </div>
        
        <div id="resource-packs" class="page-content max-w-3xl mx-auto p-10">
            <h1 class="text-4xl font-bold mb-8 text-white">Resource Packs</h1>
            <a href="https://drive.google.com/file/d/1yxtR2PfXFyN6tk--7PR1vSpbnzzPMl25/view?usp=drive_link" target="_blank" class="bg-neutral-800 hover:bg-neutral-700 text-white px-8 py-4 rounded-xl">Download</a>
        </div>
        
        <div id="discord" class="page-content max-w-3xl mx-auto p-10">
            <h1 class="text-4xl font-bold mb-8 text-white">Discord Server</h1>
            <p class="text-neutral-400">Coming soon!</p>
        </div>
    </main>

    <div id="music-player" class="fixed bottom-6 right-6 z-50 bg-neutral-900/80 backdrop-blur-md p-3 rounded-full border border-neutral-700 flex items-center gap-3">
        <button id="toggle-music" class="text-white hover:text-purple-400">Play</button>
        <span class="text-neutral-400 text-xs">ANARCHY AUDIO</span>
    </div>

    <audio id="bg-audio" src="https://res.cloudinary.com/dgg0ph1bx/video/upload/v1776507489/660655ec5901fb8_kfihkx.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
